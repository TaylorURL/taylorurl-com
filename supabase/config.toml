# Per-function runtime config. Mirrored by `supabase functions deploy`.
#
# Both services are public by design:
#   - `analytics-service` serves `/beacon.js` via a plain <script src> on every
#     tracked site (browsers can't attach an apikey to a script tag), and its
#     `/track` / `/heartbeat` endpoints are called from third-party origins
#     with the anon key in the body.
#   - `error-reporting-service` receives client-side crash reports from every
#     tracked site over the same constraints.
#
# Without `verify_jwt = false`, the Supabase gateway returns 401 for the
# <script src> fetch and the entire analytics pipeline silently breaks.

[functions.analytics-service]
verify_jwt = false

[functions.error-reporting-service]
verify_jwt = false

# Live-chat assistant. Called from the public site widget on every page; the
# browser cannot send a real JWT, so the gateway must accept the anon key
# without verifying. The function still validates origin + applies its own
# per-session rate limit.
[functions.livechat-service]
verify_jwt = false
